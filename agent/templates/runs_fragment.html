{% if runs %}
<ul class="run-history-list">
  {% for run in runs %}
  <li class="run-history-item">
    <span class="run-history-task">{{ run.task[:60] }}</span>
    <span class="badge badge-{{ run.status | replace('complete','green') | replace('error','red') | replace('stopped','gray') }}">{{ run.status }}</span>
    <time class="run-history-time" datetime="{{ run.started_at }}">{{ run.started_at }}</time>
  </li>
  {% endfor %}
</ul>
{% else %}
<p class="run-history-empty">No runs yet. Enter a task above to start.</p>
{% endif %}

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>local-browser-agent</title>
  <!-- HTMX 2.0.10 + SSE extension -->
  <script defer src="https://unpkg.com/htmx.org@2.0.10/dist/htmx.min.js"></script>
  <script defer src="https://unpkg.com/htmx-ext-sse@2.2.4/sse.js"></script>
  <!-- Alpine.js 3.15.12 -->
  <script defer src="https://unpkg.com/alpinejs@3.15.12/dist/cdn.min.js"></script>
  <!-- App stylesheet -->
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="app-header">local-browser-agent</header>

  <!--
    Outer SSE container — hx-ext="sse" activates HTMX SSE extension.
    sse-connect="/stream" opens the SSE connection.
    sse-close="done" tells HTMX to close the connection when event:done arrives.
    x-data="agentUI()" binds the Alpine reactive component.
  -->
  <div id="sse-container"
       hx-ext="sse"
       sse-connect="/stream"
       sse-close="done"
       x-data="agentUI()">

    <div class="layout">

      <!-- Left column: screenshot viewport -->
      <div class="screenshot-col panel">
        <div class="screenshot-frame">
          <div class="screenshot-placeholder" x-show="state === 'idle'">
            Waiting for agent&hellip;
          </div>
          <img id="screenshot-img"
               src=""
               alt="Agent viewport"
               style="display:none"
               x-show="state !== 'idle'">
        </div>
      </div>

      <!-- Right column: control panel -->
      <div class="control-col panel control-panel">

        <!-- State badge + progress counter -->
        <div class="state-row">
          Status:&nbsp;
          <span class="badge"
                role="status"
                aria-live="polite"
                x-text="state"
                :class="badgeClass()"></span>
          <span class="progress-counter"
                x-show="state === 'running' || state === 'paused'"
                x-text="`Step ${stepNum} of ${maxSteps} · ${elapsed}s`"></span>
        </div>

        <!-- Task form -->
        <form hx-post="/run" hx-swap="none">
          <textarea name="task"
                    rows="3"
                    placeholder="Describe a task for the agent — e.g. find the Wikipedia page for the Eiffel Tower"
                    :readonly="state === 'running' || state === 'paused'"></textarea>
          <button type="submit"
                  class="btn btn-primary"
                  style="margin-top:8px"
                  :disabled="state === 'running' || state === 'paused'">
            Run
          </button>
        </form>

        <!-- Result area: summary + error (inline, no modals — D-10) -->
        <div id="result-area" class="result-area">
          <div class="summary-box"
               role="status"
               aria-live="polite"
               x-show="summary"
               x-text="summary"></div>
          <div class="error-box"
               role="alert"
               aria-live="assertive"
               x-show="errorMsg"
               x-text="errorMsg + ' — check your config and try again.'"></div>
        </div>

        <!-- Pause / Stop buttons (Plan 03 enables these; placeholders here) -->
        <div class="action-row">
          <button class="btn btn-neutral"
                  :disabled="state !== 'running' && state !== 'paused'"
                  title="Pause/Resume (Plan 03)">
            Pause
          </button>
          <button class="btn btn-destructive"
                  :disabled="state !== 'running' && state !== 'paused'"
                  title="Stop (Plan 03)">
            Stop
          </button>
        </div>

        <!-- Narration feed label -->
        <div class="narration-label">Agent log</div>

        <!-- Narration feed container — rows appended by Alpine handleNarration -->
        <div id="narration-feed"
             class="narration-feed"
             role="log"
             aria-live="polite"
             aria-label="Agent narration"></div>

        <!--
          SSE event bridges — hidden divs inside #sse-container so HTMX SSE extension
          delivers events (RESEARCH Pitfall 3: sse-swap targets must be descendants).
          Each div listens to a specific SSE event type and dispatches to Alpine handlers.
          All SSE events carry JSON payload in event.detail.data (Plan 01 used data= not raw_data).
        -->
        <div style="display:none"
             sse-swap="state"
             hx-on:htmx:sse-message="handleState($event)"></div>

        <div style="display:none"
             sse-swap="narration"
             hx-on:htmx:sse-message="handleNarration($event)"></div>

        <div style="display:none"
             sse-swap="summary"
             hx-on:htmx:sse-message="handleSummary($event)"></div>

        <div style="display:none"
             sse-swap="error_msg"
             hx-on:htmx:sse-message="handleError($event)"></div>

        <div style="display:none"
             sse-swap="screenshot"
             hx-on:htmx:sse-message="handleScreenshot($event)"></div>

        <div style="display:none"
             sse-swap="progress"
             hx-on:htmx:sse-message="handleProgress($event)"></div>

      </div><!-- /right column -->
    </div><!-- /layout -->
  </div><!-- /sse-container -->

  <script>
    function agentUI() {
      return {
        state: 'idle',
        summary: '',
        errorMsg: '',
        stepNum: 0,
        maxSteps: 25,
        elapsed: 0,
        runStartedAt: null,
        _elapsedTimer: null,

        badgeClass() {
          return {
            'badge-gray':   this.state === 'idle',
            'badge-blue':   this.state === 'running',
            'badge-yellow': this.state === 'paused',
            'badge-green':  this.state === 'complete',
            'badge-red':    this.state === 'error',
          };
        },

        handleState($event) {
          const d = JSON.parse($event.detail.data);
          this.state = d.state;
          if (d.state === 'running' && this._elapsedTimer === null) {
            this.runStartedAt = Date.now();
            this.elapsed = 0;
            this._elapsedTimer = setInterval(() => {
              this.elapsed = Math.floor((Date.now() - this.runStartedAt) / 1000);
            }, 1000);
          }
          if (d.state === 'complete' || d.state === 'error' || d.state === 'idle') {
            if (this._elapsedTimer !== null) {
              clearInterval(this._elapsedTimer);
              this._elapsedTimer = null;
            }
          }
        },

        handleNarration($event) {
          const d = JSON.parse($event.detail.data);
          const feed = document.getElementById('narration-feed');
          if (!feed) return;
          // Create DOM nodes via createElement+textContent — never innerHTML (T-03-02)
          const row = document.createElement('div');
          row.className = 'narration-row';
          const stepSpan = document.createElement('span');
          stepSpan.className = 'step-num';
          stepSpan.textContent = d.step;
          const textSpan = document.createElement('span');
          textSpan.className = 'narration-text';
          textSpan.textContent = d.text;
          const tsSpan = document.createElement('span');
          tsSpan.className = 'timestamp';
          tsSpan.textContent = d.timestamp ? d.timestamp.substring(11, 19) : '';
          row.appendChild(stepSpan);
          row.appendChild(textSpan);
          row.appendChild(tsSpan);
          feed.appendChild(row);
          feed.scrollTop = feed.scrollHeight;
        },

        handleSummary($event) {
          const d = JSON.parse($event.detail.data);
          this.summary = d.text;
        },

        handleError($event) {
          const d = JSON.parse($event.detail.data);
          // Set errorMsg only; template appends " — check your config..." via x-text binding
          this.errorMsg = d.message;
        },

        handleScreenshot($event) {
          const d = JSON.parse($event.detail.data);
          if (d.b64) {
            const img = document.getElementById('screenshot-img');
            if (img) {
              // Set img.src via property — not innerHTML (T-03-02)
              img.src = 'data:image/png;base64,' + d.b64;
            }
          }
        },

        handleProgress($event) {
          const d = JSON.parse($event.detail.data);
          this.stepNum = d.step;
          this.maxSteps = d.max_steps;
        },
      };
    }
  </script>
</body>
</html>

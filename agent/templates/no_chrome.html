<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>local-browser-agent — Chrome Required</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d0d0d;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      max-width: 480px;
      width: 100%;
      padding: 2.5rem;
      text-align: center;
    }
    .icon {
      font-size: 3rem;
      margin-bottom: 1.25rem;
      display: block;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #f5f5f5;
    }
    p {
      font-size: 0.95rem;
      color: #a0a0a0;
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }
    .btn {
      display: inline-block;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.65rem 1.5rem;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .btn:hover { background: #1d4ed8; }
    .note {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon" role="img" aria-label="Chrome logo">&#x1F310;</span>
    <h1>Google Chrome is required to run local-browser-agent</h1>
    <p>
      local-browser-agent drives your installed Google Chrome to complete tasks on your behalf.
      Chrome was not found at its standard location on this machine.
    </p>
    <a href="https://www.google.com/chrome/" target="_blank" rel="noopener" class="btn">
      Download Google Chrome
    </a>
    <p class="note">
      After installing Chrome, restart local-browser-agent.
    </p>
  </div>
</body>
</html>

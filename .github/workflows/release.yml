name: CI

"on":
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run tests
        run: uv run pytest tests/ -q --tb=short

      - name: Verify launch script syntax (Linux)
        if: runner.os == 'Linux'
        run: bash -n launch.sh && echo "launch.sh syntax ok"

      - name: Verify agent imports on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: uv run python -c "import agent; print('agent importable on Windows')"

  build-mac:
    name: Build Mac .app
    runs-on: macos-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Build macOS .app
        run: uv run pyinstaller local-browser-agent.spec

      - name: Ad-hoc codesign
        run: codesign --force --deep -s - dist/local-browser-agent.app

      - name: Zip artifact
        run: cd dist && zip -r ../local-browser-agent-mac.zip local-browser-agent.app

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: local-browser-agent-mac.zip

  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Build Windows .exe
        run: uv run pyinstaller local-browser-agent-windows.spec

      - name: Zip artifact
        shell: pwsh
        run: Compress-Archive -Path dist\local-browser-agent -DestinationPath local-browser-agent-windows.zip

      - name: Smoke test frozen exe
        shell: pwsh
        run: |
          $proc = Start-Process -FilePath "dist\local-browser-agent\local-browser-agent.exe" -PassThru
          Start-Sleep -Seconds 5
          if ($proc.HasExited -and $proc.ExitCode -ne 0) {
            Write-Error "exe crashed on startup with exit code $($proc.ExitCode)"
            exit 1
          }
          Write-Host "exe started successfully (pid $($proc.Id), still running: $(-not $proc.HasExited))"
          $proc | Stop-Process -Force -ErrorAction SilentlyContinue

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: local-browser-agent-windows.zip

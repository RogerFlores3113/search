name: CI

"on":
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Run tests
        run: uv run pytest tests/ -q --tb=short

      - name: Verify launch script syntax (Linux)
        if: runner.os == 'Linux'
        run: bash -n launch.sh && echo "launch.sh syntax ok"

      - name: Verify agent imports on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: uv run python -c "import agent; print('agent importable on Windows')"
